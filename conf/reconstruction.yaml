run_name: Reconstruction-FM
data:
  data_file: /n/holylfs05/LABS/arguelles_delgado_lab/Everyone/hhanif/tambo_simulations_for_training/reconstruction_for_training.h5
  condition_features:
  - energy_per_layer_electron
  - num_points_per_layer_electron
  - time_per_layer_electron
  transform_directions:
    - [StandardScaler, {shape: [1, 3]}]
  transform_pdg:
    - [StandardScaler, {shape: [1, 1]}]
  transform_energy:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]
  transform_condition:
    - [StandardScaler, {shape: [1, 72]}]
  batch_size: 1024
  batch_size_val: 4096
  num_val: 30000
model:
  name: FullyConnected
  dim_input: 5
  dim_condition: 72
  dim_time: 12
  hidden_dims:
  - 128
  - 256
  - 512
  - 256
  - 128
  flow:
    frequencies: 6
training:
  epochs: 500
  steps: 100
  optimizer:
    name: Adam
    lr: 0.001
  scheduler:
    name: OneCycleLR