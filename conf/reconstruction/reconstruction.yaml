run_name: Reconstruction-FM

data:
  data_file: /n/holylfs05/LABS/arguelles_delgado_lab/Everyone/hhanif/tambo_simulations_for_training/reconstruction_combined.h5

  # Customizable: select which HDF5 dataset keys to use as condition features.
  # Each entry is an exact key in the HDF5 file.
  # Available keys follow the pattern: {observable}_{particle_type}
  #   observables: num_points_per_layer, energy_per_layer, time_per_layer
  #   particle types: electron, muon, photon
  condition_features:
    - energy_per_layer_electron        # 24 dims
    - num_points_per_layer_electron    # 24 dims
    - time_per_layer_electron          # 24 dims

  # Separate transforms for each target component:
  #   target = [directions(3), pdg(1), energy(1)] = 5D

  # Directions: standardize
  transform_directions:
    - [StandardScaler, {shape: [1, 3]}]

  # PDG label (integer 0/1): dequantize to make continuous, then standardize.
  # Dequantize adds U(0,1) noise: 0->[0,1), 1->[1,2). Inverse uses floor().
  transform_pdg:
    - [Dequantize]
    - [StandardScaler, {shape: [1, 1]}]

  # Energy: log-transform then standardize (same as allshowers energy trafo)
  transform_energy:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]

  # Transformations for the condition features
  transform_condition:
    - [StandardScaler, {shape: [1, 72]}]   # 3 features x 24 layers = 72

  batch_size: 1024
  batch_size_val: 4096
  num_val: 30000

model:
  name: ConcatSquash
  dim_input: 5             # directions (3) + pdg (1) + energy (1)
  dim_condition: 72        # 3 observables x 1 particle type x 24 layers
  dim_time: 12
  hidden_dims:
    - 256
    - 512
    - 1024
    - 512
    - 256

training:
  epochs: 500
  steps: 100
  optimizer:
    name: Adam
    lr: 0.001
  scheduler:
    name: OneCycleLR
