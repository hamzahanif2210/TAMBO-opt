run_name: Electron-Allshower-ContinuousZ


data:
  path: /n/holylfs05/LABS/arguelles_delgado_lab/Everyone/hhanif/tambo_simulations_for_training/combined_electrons_balanced.h5
  samples_energy_trafo:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]
  samples_coordinate_trafo:
    - [StandardScaler, {shape: [1, 1, 3]}]    # x, y, z (3D coordinates)
  samples_time_trafo:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]
  cond_trafo:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]
  z_spacing: 500                    # physical distance between planes (meters)
  return_noise: True
  return_direction: True
  val_len: 30000
  max_num_points: 2048


model:
  continuous_z: true                # Z is a continuous learned feature
  num_layers: 24                    # still used for num_points histogram conditioning
  dim_inputs: [5, 6, 4]            # x, y, z, e, t  (was [4, 6, 4] without z)
  dim_embedding: 64
  num_head: 4
  num_blocks: 4
  dim_feedforward: 256
  num_points_cond: 512
  activation: GELU
  num_layer_cond: -1                # no layer-based attention masking (was 8)
  num_particles: 2
  flow_config:
    frequencies: 3

train:
  num_epochs: 200
  batch_size: 1024
  learning_rate: 1.e-3
  optimizer: Ranger
  scheduler: Cosine
  weight_decay: 1.e-2
  grad_clip: 0.2
